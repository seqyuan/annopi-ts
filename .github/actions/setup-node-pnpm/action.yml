name: Setup Node and pnpm
description: Configure Node.js, activate pnpm through Corepack, and optionally install dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "22"
  pnpm-version:
    description: pnpm version to activate with Corepack.
    required: false
    default: "10.33.0"
  install:
    description: Whether to install dependencies.
    required: false
    default: "true"
  working-directory:
    description: Directory containing package.json and pnpm-lock.yaml.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Activate pnpm
      shell: bash
      run: corepack prepare pnpm@${{ inputs.pnpm-version }} --activate

    - name: Install Dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: corepack pnpm install --frozen-lockfile
